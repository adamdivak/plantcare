<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>PlantCare</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Home Screen -->
  <div id="home-screen">
    <header id="app-header">
      <h1>PlantCare</h1>
    </header>

    <main id="plant-grid"></main>

    <div id="empty-state" hidden>
      <p>No plants yet!</p>
      <button id="empty-add-btn">Add your first plant</button>
    </div>

    <footer id="action-bar">
      <button id="btn-water" class="action-btn" disabled>
        <span class="action-icon">💧</span>
        <span class="action-label">Water</span>
      </button>
      <button id="btn-fertilize" class="action-btn" disabled>
        <span class="action-icon">🧪</span>
        <span class="action-label">Fertilize</span>
      </button>
      <button id="btn-edit" class="action-btn" disabled>
        <span class="action-icon">✏️</span>
        <span class="action-label">Edit</span>
      </button>
      <div class="action-divider"></div>
      <button id="btn-add" class="action-btn action-add">
        <span class="action-icon">＋</span>
        <span class="action-label">Add</span>
      </button>
    </footer>
  </div>

  <!-- Edit Screen (overlay) -->
  <div id="edit-screen" hidden>
    <header id="edit-header">
      <button id="btn-back">← Back</button>
      <h2 id="edit-title">Edit Plant</h2>
      <button id="btn-save">Save</button>
    </header>

    <div id="edit-body">
      <!-- Icon picker trigger -->
      <div id="edit-icon-section">
        <button id="edit-icon-btn" type="button">
          <span id="edit-icon-display">🪴</span>
          <span class="edit-badge">✎</span>
        </button>
      </div>

      <!-- Name & Room -->
      <div class="edit-field">
        <label for="edit-name">Name</label>
        <input type="text" id="edit-name" placeholder="Plant name">
      </div>
      <div class="edit-field">
        <label for="edit-room">Room</label>
        <input type="text" id="edit-room" placeholder="e.g. Living Room" list="room-suggestions">
        <datalist id="room-suggestions"></datalist>
      </div>

      <!-- Season schedule table -->
      <div id="edit-seasons">
        <h3>Care Schedule</h3>
        <div class="table-wrap">
        <table id="season-table">
          <thead>
            <tr>
              <th>Season</th>
              <th>Start</th>
              <th>End</th>
              <th>💧 days</th>
              <th>🧪 days</th>
            </tr>
          </thead>
          <tbody>
            <tr id="season-summer">
              <td class="season-label summer-label">☀️ Summer</td>
              <td><select class="monthday-input" id="summer-start-month"></select> <select class="monthday-input" id="summer-start-day"></select></td>
              <td><select class="monthday-input" id="summer-end-month"></select> <select class="monthday-input" id="summer-end-day"></select></td>
              <td><input type="number" class="freq-input" id="summer-water" min="0" value="7"></td>
              <td><input type="number" class="freq-input" id="summer-fert" min="0" value="14"></td>
            </tr>
            <tr id="season-winter">
              <td class="season-label winter-label">❄️ Winter</td>
              <td><select class="monthday-input" id="winter-start-month"></select> <select class="monthday-input" id="winter-start-day"></select></td>
              <td><select class="monthday-input" id="winter-end-month"></select> <select class="monthday-input" id="winter-end-day"></select></td>
              <td><input type="number" class="freq-input" id="winter-water" min="0" value="14"></td>
              <td><input type="number" class="freq-input" id="winter-fert" min="0" value="0"></td>
            </tr>
          </tbody>
        </table>
        </div>
        <p class="hint">Changing a date auto-adjusts the other season. Set 0 for no care needed.</p>
      </div>

      <!-- History (read-only) -->
      <div id="edit-history">
        <h3>History</h3>
        <div id="history-list"></div>
      </div>

      <!-- Action buttons -->
      <div id="edit-actions">
        <div class="edit-actions-row">
          <button id="btn-water-now" class="edit-action-btn water-btn">💧 Water Now</button>
          <button id="btn-fert-now" class="edit-action-btn fert-btn">🧪 Fertilize</button>
        </div>
        <div class="edit-actions-row">
          <button id="btn-duplicate" class="edit-action-btn secondary-btn">📋 Duplicate</button>
          <button id="btn-delete" class="edit-action-btn danger-btn">🗑 Delete</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Emoji Picker Modal -->
  <div id="emoji-picker" hidden>
    <div id="emoji-picker-backdrop"></div>
    <div id="emoji-picker-content">
      <h3>Choose an icon</h3>
      <div id="emoji-grid"></div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
